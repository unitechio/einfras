syntax = "proto3";

package agent.v1;

option go_package = "einfra/api/internal/modules/agent/infrastructure/grpcpb";

// AgentService is the primary bidirectional streaming API for the EINFRA Control Plane -> Agent communication.
service AgentService {
    // ConnectStream establishes a persistent bidirectional connection.
    rpc ConnectStream(stream AgentEvent) returns (stream ControlMessage) {}
}

// ─── Messages sent from Control Plane TO Agent ──────────────────────────────

message ControlMessage {
    string message_id = 1;
    string idempotency_key = 2; // Dedup execution

    oneof payload {
        ExecuteTask execute_task = 10;
        TriggerSkill trigger_skill = 11;
        CancelExecution cancel_execution = 12;
        ServiceAction service_action = 13;
        ListServices list_services = 14;
    }
}

// ExecuteTask instructs the agent to run a raw shell command or binary.
message ExecuteTask {
    string task_id = 1;
    string cmd = 2;
    int32 timeout_s = 3;
    map<string, string> env = 4;
}

// TriggerSkill tells the agent to execute a pre-defined Antigravity Skill locally.
message TriggerSkill {
    string task_id = 1;
    string skill_name = 2;              // E.g., "@security-auditor"
    map<string, string> context = 3;    // Data payload containing files, logs, etc.
}

message CancelExecution {
    string target_task_id = 1;
}

// ServiceAction instructs the agent to perform an action on a system service.
message ServiceAction {
    string service_name = 1;
    string action = 2; // start, stop, restart, enable, disable
}

// ListServices requests the agent to return a list of system services.
message ListServices {
    string filter_pattern = 1;
}

// ─── Messages sent from Agent TO Control Plane ──────────────────────────────

message AgentEvent {
    string server_id = 1;
    string session_id = 2; // Unique connection session string
    int64 timestamp_ms = 3;

    oneof payload {
        RegisterRequest register = 10;
        Heartbeat heartbeat = 11;
        TaskOutput task_output = 12;
        SkillExecutionResult skill_result = 13;
        ServiceListResponse service_list = 14;
    }
}

// ServiceListResponse is the response to a ListServices command.
message ServiceListResponse {
    string request_id = 1;
    repeated ServiceEntry services = 2;
}

message ServiceEntry {
    string name = 1;
    string description = 2;
    string status = 3; // active, inactive, failed
    string startup = 4; // enabled, disabled
}

message RegisterRequest {
    string agent_version = 1;
    string os = 2;
    string arch = 3;
    repeated string capabilities = 4;
}

message Heartbeat {
    float cpu_percent = 1;
    float mem_percent = 2;
    int64 uptime_seconds = 3;
    float disk_percent = 4;
    int32 cpu_cores = 5;
    float memory_gb = 6;
    int32 disk_gb = 7;
    bool has_docker = 8;
    bool has_k8s = 9;
    string os = 10;
    string arch = 11;
    string agent_version = 12;
}

// Streamed incrementally as standard out/err arrives.
message TaskOutput {
    string task_id = 1;
    bytes data = 2;
    bool is_stderr = 3;
    int64 seq = 4; // Chunk sequence number to maintain ordering
}

// Sent when a complex Skill or Task finishes executing.
message SkillExecutionResult {
    string task_id = 1;
    string skill_name = 2;
    int32 exit_code = 3;
    string final_output = 4; // The aggregated intelligence/result
    string error_reason = 5; // Populated if failure occurred
    int64 duration_ms = 6;
}
