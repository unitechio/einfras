apiVersion: v1
kind: Namespace
metadata:
  name: demo-infra
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: demo-infra
data:
  APP_ENV: "dev"
  LOG_LEVEL: "debug"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: demo-infra
type: Opaque
stringData:
  DB_PASSWORD: "secret123"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: demo-infra
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-clusterip
  namespace: demo-infra
spec:
  type: ClusterIP
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-nodeport
  namespace: demo-infra
spec:
  type: NodePort
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: demo-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /tmp/demo-pv
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: demo-pvc
  namespace: demo-infra
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: demo-job
  namespace: demo-infra
spec:
  template:
    spec:
      containers:
        - name: job
          image: busybox
          command: ["echo", "Hello from Job"]
      restartPolicy: Never
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: demo-cronjob
  namespace: demo-infra
spec:
  schedule: "*/2 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: cron
              image: busybox
              args:
                - /bin/sh
                - -c
                - date
          restartPolicy: OnFailure
